name: CI/CD Pipeline — Space-API

on:
  push:
    branches: [ main ]

jobs:

  # ── JOB 1 : Tests ──────────────────────────────────────
  test:
    name: 🧪 Tests pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"
      
      - name: Installer les dépendances
        run: pip install -r requirements.txt pytest httpx
      
      - name: Lancer les tests
        run: pytest test_app.py -v

  # ── JOB 2 : Build Docker ───────────────────────────────
  docker:
    name: 🐋 Build Docker
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v3
      
      - name: Build image
        run: docker build -t api-sapceX .

  # ── JOB 3 : Deploy Render ──────────────────────────────
  deploy:
    name: 🚀 Deploy Render
    runs-on: ubuntu-latest
    needs: docker
    steps:
      - name: Trigger Render
        run: curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK }}


